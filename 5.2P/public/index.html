<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Catalog</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
            line-height: 1.6;
        }

        .book-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        h1 {
            color: #2c3e50;
        }

        .author {
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>

<body>
    <h1>Book Catalog</h1>
    <div id="book-list">Loading books...</div>

    <script>
        //Function to fetch books from our API
        async function fetchBooks() {
            try {
                const response = await fetch('/api/books');
                const result = await response.json();

                if (result.statusCode === 200) {
                    displayBooks(result.data);
                } else {
                    document.getElementById('book-list').innerText = "Failed to load books.";
                }
            } catch (error) {
                console.error("Error fetching books:", error);
                document.getElementById('book-list').innerText = "Error connecting to server.";
            }
        }

        //Function to render the list
        function displayBooks(books) {
            const container = document.getElementById('book-list');
            container.innerHTML = ''; // Clear loading message

            books.forEach(book => {
                const bookDiv = document.createElement('div');
                bookDiv.className = 'book-card';
                bookDiv.innerHTML = `
                    <h3>${book.title}</h3>
                    <p class="author">By ${book.author} (${book.year})</p>
                    <p>${book.summary}</p>
                `;
                container.appendChild(bookDiv);
            });
        }

        //To Run fetch on load
        window.onload = fetchBooks;
    </script>
</body>

</html>
