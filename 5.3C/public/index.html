<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Catalog</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
            line-height: 1.6;
            display: flex;
            gap: 50px;
        }

        h1 {
            color: #2c3e50;
            width: 100%;
            position: absolute;
            top: 0;
            left: 40px;
        }

        #list-section {
            margin-top: 60px;
            flex: 1;
        }

        #detail-section {
            margin-top: 60px;
            flex: 1;
            padding: 20px;
            border: 2px solid #3498db;
            border-radius: 8px;
            background-color: #f9f9f9;
            height: fit-content;
            position: sticky;
            top: 60px;
        }

        .book-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .book-card:hover {
            background-color: #f0f0f0;
        }

        .price-tag {
            color: #27ae60;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Book Catalog</h1>

    <div id="list-section">
        <h3>Books Available</h3>
        <div id="book-list">Loading books...</div>
    </div>

    <div id="detail-section">
        <h3>Book Details</h3>
        <div id="book-details">Select a book to view details.</div>
    </div>

    <script>
        //To fetch all books for the main list
        async function fetchBooks() {
            try {
                const response = await fetch('/api/books');
                const result = await response.json();

                if (result.statusCode === 200) {
                    displayBooks(result.data);
                } else {
                    document.getElementById('book-list').innerText = "Failed to load books.";
                }
            } catch (error) {
                document.getElementById('book-list').innerText = "Error connecting to server.";
            }
        }

        //to render the list 
        function displayBooks(books) {
            const container = document.getElementById('book-list');
            container.innerHTML = '';

            books.forEach(book => {
                const bookDiv = document.createElement('div');
                bookDiv.className = 'book-card';
                bookDiv.innerHTML = `
                    <strong>${book.title}</strong> - <span class="price-tag">${book.price} AUD</span>
                `;

                //fetching a specific book's details when clicked
                bookDiv.onclick = () => fetchSingleBook(book.id || book._id);

                container.appendChild(bookDiv);
            });
        }

        //to fetch specific book details
        async function fetchSingleBook(id) {
            try {
                const response = await fetch(`/api/books/${id}`);
                const result = await response.json();

                if (result.statusCode === 200) {
                    showDetails(result.data);
                }
            } catch (error) {
                console.error("Error fetching book details:", error);
            }
        }

        //to render details in the right-hand panel
        function showDetails(book) {
            const detailContainer = document.getElementById('book-details');
            detailContainer.innerHTML = `
                <h4>${book.title}</h4>
                <p><strong>Author:</strong> ${book.author}</p>
                <p><strong>Year:</strong> ${book.year}</p>
                <p><strong>Genre:</strong> ${book.genre}</p>
                <p><strong>Price:</strong> ${book.price} AUD</p>
                <hr>
                <p><strong>Summary:</strong> ${book.summary}</p>
            `;
        }

        //to run fetch on load
        window.onload = fetchBooks;
    </script>
</body>

</html>
